<!DOCTYPE html>
<html>
    <head>
        <title>Midterm Task 3</title>
    </head>
    <body>
        <h2> How can we help you?</h2>
    <fieldset>
        <legend>Request for Proposal</legend>
        <form action = "" method = "post">
            <table border = "0" width = "100%">

                <tr>
                    <td>Your Name:</td>
                    <td><input type = "text" id = fn size = "50"><br></td>
                </tr>

                <tr>
                    <td>Email:</td>
                    <td><input type = "email" id = fn size = "50"><br></td>
                </tr>

                <tr>
                    <td>Username:</td>
                    <td><input type = "text" id = fn size = "50"><br></td>
                </tr>

                <tr>
                    <td>Password:</td>
                    <td><input type = "password" id = fn size = "50"><br></td>
                </tr>

                <tr>
                    <td>Your Business</td>
                    <td><textarea placeholder="Briefly describe your business"></textarea></td>
                </tr>

                <tr>
                    <td>Company Size:</td>
                <td>
                    <input type = "radio" name = "Company Size">Less than 10<br>
                    <input type = "radio" name = "Company Size">11 to 50<br>
                    <input type = "radio" name = "Company Size">50 to 200<br>
                    <input type = "radio" name = "Company Size">Over 200<br>
                </td>
                </tr>

                <tr>
                    <td>Service:</td>
                    <td>
                    <input type = "checkbox">Brand Identity
                    <input type = "checkbox">New Website
                    <input type = "checkbox">Web Redesign
                    <br>
                </td>
                </tr>

                <tr>
                    <td>Timeline:</td>
                    <td>
                        <select>
                            <option>Immediately</option>
                            <option>1-2 weeks</option>
                            <option>3-6 weeks</option>
                            <option>7-2 months</option>   
                        </select>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td><input type = "submit" value = "Send to dev/design"></td>
                </tr>
            </table>
        </form>
    </fieldset>
    
    </body>
    </html>
